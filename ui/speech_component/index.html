<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 4px 0;
      font-family: sans-serif;
      background: transparent;
    }
    #mic-btn {
      background: #f3f4f6;
      border: 2px solid #d1d5db;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    #mic-btn:hover {
      background: #e5e7eb;
      border-color: #4F46E5;
    }
    #mic-btn.listening {
      background: #fee2e2;
      border-color: #ef4444;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(1);    }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1);    }
    }
    #status {
      display: inline-block;
      font-size: 11px;
      color: #6b7280;
      margin-left: 8px;
      vertical-align: middle;
    }
    #no-support {
      font-size: 12px;
      color: #9ca3af;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <div id="container">
    <button id="mic-btn" title="Click to speak">🎤</button>
    <span id="status"></span>
  </div>
  <div id="no-support" style="display:none;">Voice available in Chrome.</div>

  <script>
    // ── Streamlit component handshake ──────────────────────────────────────
    window.parent.postMessage({ type: "streamlit:componentReady", apiVersion: 1 }, "*");

    function setHeight(h) {
      window.parent.postMessage({ type: "streamlit:setFrameHeight", height: h }, "*");
    }

    function sendValue(val) {
      window.parent.postMessage(
        { type: "streamlit:setComponentValue", value: val, dataType: "json" },
        "*"
      );
    }

    // ── Feature detection ──────────────────────────────────────────────────
    var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRec) {
      document.getElementById("container").style.display = "none";
      document.getElementById("no-support").style.display = "block";
      setHeight(28);
    } else {
      setHeight(52);

      var btn         = document.getElementById("mic-btn");
      var status      = document.getElementById("status");
      var recognition = new SpeechRec();
      recognition.lang            = "en-US";
      recognition.interimResults  = false;
      recognition.maxAlternatives = 1;
      var listening = false;

      btn.addEventListener("click", function () {
        if (!listening) {
          recognition.start();
        } else {
          recognition.stop();
        }
      });

      recognition.onstart = function () {
        listening = true;
        btn.classList.add("listening");
        status.textContent = "Listening…";
      };

      recognition.onresult = function (event) {
        var transcript = event.results[0][0].transcript;
        status.textContent = "Got it!";
        sendValue(transcript);
        // Reset after a brief pause so the same transcript is not replayed
        setTimeout(function () {
          status.textContent = "";
          sendValue(null);
        }, 600);
      };

      recognition.onend = function () {
        listening = false;
        btn.classList.remove("listening");
      };

      recognition.onerror = function (event) {
        listening = false;
        btn.classList.remove("listening");
        var msg = "Try again.";
        if (event.error === "not-allowed")  msg = "Mic permission denied.";
        else if (event.error === "no-speech") msg = "No speech detected.";
        status.textContent = msg;
        setTimeout(function () { status.textContent = ""; }, 3000);
      };

      // Receive render updates from Streamlit (args etc.)
      window.addEventListener("message", function (event) {
        if (event.data.type === "streamlit:render") { /* no dynamic args needed */ }
      });
    }
  </script>
</body>
</html>
