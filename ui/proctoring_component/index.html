<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>html, body { margin: 0; padding: 0; overflow: hidden; }</style>
</head>
<body>
<script>
// Minimal Streamlit component protocol — no CDN, pure postMessage
(function () {
  var _listeners = {};

  function _post(type, extra) {
    window.parent.postMessage(
      Object.assign({ isStreamlitMessage: true, type: type }, extra || {}),
      "*"
    );
  }

  window.Streamlit = {
    RENDER_EVENT: "streamlit:render",
    events: {
      addEventListener: function (type, fn) {
        if (!_listeners[type]) _listeners[type] = [];
        _listeners[type].push(fn);
      }
    },
    setComponentReady: function () {
      _post("streamlit:componentReady", { apiVersion: 1 });
    },
    setComponentValue: function (value) {
      _post("streamlit:setComponentValue", { value: value, dataType: "json" });
    },
    setFrameHeight: function (h) {
      _post("streamlit:setFrameHeight", { height: h !== undefined ? h : 0 });
    }
  };

  window.addEventListener("message", function (e) {
    if (e.data && e.data.type === "streamlit:render") {
      (_listeners["streamlit:render"] || []).forEach(function (fn) {
        fn({ detail: e.data });
      });
    }
  });
})();

// ── Focus-shift detection ────────────────────────────────────────────────────
var shifts = 0;
var lastHidden = false;
var ready = false;

Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, function () {
  Streamlit.setFrameHeight(0);
  if (!ready) {
    ready = true;
    Streamlit.setComponentValue(shifts);
  }
});

Streamlit.setComponentReady();

document.addEventListener("visibilitychange", function () {
  if (document.hidden && !lastHidden) {
    lastHidden = true;
    shifts += 1;
    Streamlit.setComponentValue(shifts);
  } else if (!document.hidden) {
    lastHidden = false;
  }
});

window.addEventListener("blur", function () {
  if (!lastHidden) {
    lastHidden = true;
    shifts += 1;
    Streamlit.setComponentValue(shifts);
  }
});

window.addEventListener("focus", function () {
  lastHidden = false;
});
</script>
</body>
</html>
